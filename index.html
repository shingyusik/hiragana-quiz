<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japanese Study Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-tab-shell">
          <div class="tab-group tab-group-primary" role="tablist" aria-label="과목 탭">
            <button
              id="categoryHiragana"
              class="page-tab is-active"
              type="button"
              role="tab"
              aria-selected="true"
            >
              히라가나
            </button>
            <button
              id="categoryKatakana"
              class="page-tab"
              type="button"
              role="tab"
              aria-selected="false"
            >
              카타카나
            </button>
            <button
              id="categoryVocab"
              class="page-tab"
              type="button"
              role="tab"
              aria-selected="false"
            >
              단어
            </button>
            <button
              id="categoryGrammar"
              class="page-tab"
              type="button"
              role="tab"
              aria-selected="false"
            >
              문법
            </button>
          </div>
        </div>

        <div class="hero-content">
          <p class="eyebrow">Japanese Study Lab</p>
          <h1>일본어 학습 허브</h1>
          <p class="hero-copy">
            히라가나, 카타카나, 단어, 문법을 한 화면에서 오가며 학습하고 바로
            퀴즈로 확인할 수 있습니다. 상단 탭으로 과목을 바꾸고, 내부에서
            학습과 퀴즈를 전환하세요.
          </p>
          <p id="heroContext" class="hero-context"></p>

          <div class="tab-rack">
            <div class="tab-group tab-group-secondary" role="tablist" aria-label="모드 탭">
            <button
              id="modeLearn"
              class="mode-tab is-active"
              type="button"
              role="tab"
              aria-selected="true"
            >
              학습
            </button>
            <button
              id="modeQuiz"
              class="mode-tab"
              type="button"
              role="tab"
              aria-selected="false"
            >
              퀴즈
            </button>
          </div>
          </div>

          <div id="optionToolbar" class="hero-actions" hidden>
            <button
              id="dakutenToggle"
              class="ghost-button option-button"
              type="button"
              aria-pressed="false"
            >
              탁음: OFF
            </button>
            <button
              id="handakutenToggle"
              class="ghost-button option-button"
              type="button"
              aria-pressed="false"
            >
              반탁음: OFF
            </button>
            <button
              id="youonToggle"
              class="ghost-button option-button"
              type="button"
              aria-pressed="false"
            >
              요음: OFF
            </button>
            <button
              id="sokuonToggle"
              class="ghost-button option-button"
              type="button"
              aria-pressed="false"
            >
              촉음: OFF
            </button>
            <button
              id="choonToggle"
              class="ghost-button option-button"
              type="button"
              aria-pressed="false"
            >
              장음: OFF
            </button>
          </div>
        </div>
      </section>

      <section class="content-grid">
        <article class="panel-card stage-card">
          <div id="mainCardLabel" class="card-label">히라가나 학습</div>
          <div id="mainPanel" class="panel-body"></div>
        </article>

        <article class="panel-card action-card">
          <div id="actionCardLabel" class="card-label">학습 컨트롤</div>
          <div id="actionPanel" class="panel-body"></div>
        </article>

        <article class="panel-card status-card">
          <div class="card-label">진행 상태</div>
          <div id="statusPanel" class="panel-body"></div>
        </article>

        <article class="panel-card note-card">
          <div class="card-label">가이드</div>
          <div id="notePanel" class="panel-body"></div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
